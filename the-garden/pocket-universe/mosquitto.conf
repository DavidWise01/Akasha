listener 1883
allow_anonymous true
persistence false
log_dest stdout

# === CHEVRON 1-4: bidirectional core (the dipole and three spares) ===
connection chevron1-patty
address host.docker.internal:1886
topic # both 2 pocket/chevron1/ ""
try_private true

connection chevron2
address host.docker.internal:1887
topic # both 2 pocket/chevron2/ ""
try_private true

connection chevron3
address host.docker.internal:1888
topic # both 2 pocket/chevron3/ ""
try_private true

connection chevron4
address host.docker.internal:1889
topic # both 2 pocket/chevron4/ ""
try_private true

# === CHEVRON 5-6: one-way locks (prevents the loopback) ===
connection chevron5-in
address host.docker.internal:1890
topic # in 2 pocket/chevron5/ ""
try_private true

connection chevron6-in
address host.docker.internal:1891
topic # in 2 pocket/chevron6/ ""
try_private true

# === CHEVRON 7: POINT OF ORIGIN — the outbound wormhole to Garden ===
connection chevron7-origin
address host.docker.internal:1883
topic # out 2 "" pocket/
try_private true
notifications false
version: '3.8'
services:
  mqtt:
    image: eclipse-mosquitto:2
    container_name: ${COMPOSE_PROJECT_NAME:-pocket}_mqtt
    ports:
      - "1883:1883"
    volumes:
      - ./mosquitto.conf:/mosquitto/config/mosquitto.conf:ro
    networks:
      - pocket

  attestor:
    build: ./attestor
    container_name: ${COMPOSE_PROJECT_NAME:-pocket}_attestor
    ports:
      - "8080:8080"
    environment:
      - MQTT_HOST=mqtt
      - MQTT_PORT=1883
      - SECRET_FILE=/data/secret.key
    volumes:
      - pocket_data:/data
    depends_on:
      - mqtt
    networks:
      - pocket

networks:
  pocket:
    driver: bridge

volumes:
  pocket_data:
